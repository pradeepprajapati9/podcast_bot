name: Daily Podcast

on:
  schedule:
    - cron: "0 4 * * *"    # ~09:30 IST daily
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: podcast
  cancel-in-progress: false

jobs:
  episode:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install -r requirements.txt
      - name: Create episode
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SITE_URL: ${{ vars.SITE_URL }}
          POD_LANG: hi
        run: python main.py
      - name: Publish (commit feed + audio)
        if: always()
        run: |
          git config user.name "podcast-bot"
          git config user.email "bot@users.noreply.github.com"
          git pull --rebase --autostash origin main || true
          git add docs state.json || true
          git commit -m "episode: new podcast episode [skip ci]" || echo "no change"
          git push || echo "nothing to push"
